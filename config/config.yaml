# MindCare Agent — Centralized Configuration

paths:
  model_dir: "models"
  vectorstore_dir: "vectorstore_psychology"
  advice_db: "data/conseils_emotions.csv"
  source_dir: "data/source"
  splits_dir: "splits"
  figures_dir: "figures"

ml:
  confidence_threshold: 0.60
  secondary_emotion_threshold: 0.10
  label_map:
    0: "Sadness"
    1: "Joy"
    2: "Love"
    3: "Anger"
    4: "Fear"
    5: "Surprise"

strategist:
  danger_words:
    - "suicide"
    - "kill"
    - "die"
    - "death"
    - "emergency"
    - "hospital"
    - "blood"
    - "hurt"
    - "pain"
    - "help"
    - "112"
    - "911"
    - "police"
    - "danger"
  question_words:
    - "how"
    - "why"
    - "what"
    - "explain"
    - "technique"
    - "method"
    - "?"
    - "can you"
    - "where"
  safe_emotions:
    - "joy"
    - "love"
    - "sadness"
    - "surprise"
    - "anger"
    - "fear"

agent:
  model_name: "mistral-large-latest"
  temperature: 0.3
  max_iterations: 5

carbon:
  co2_factors:
    mistral_large: 0.00285
    mistral_medium: 0.00150
    mistral_small: 0.00075
    eco_cpu: 0.00004
  system_prompt_tokens: 1000
  tool_tokens_per_call: 200
  iteration_overhead_tokens: 100
  uncertainty_pct: 20

geolocation:
  nominatim_url: "https://nominatim.openstreetmap.org/search"
  timeout_s: 5
  fallback_locations:
    sadness:
      name: "Parc de Bruxelles"
      lat: 50.8454
      lon: 4.3642
    anger:
      name: "Basic-Fit Gare Centrale"
      lat: 50.8452
      lon: 4.3594
    fear:
      name: "Bibliothèque Royale"
      lat: 50.8432
      lon: 4.3571
    joy:
      name: "Grand-Place"
      lat: 50.8468
      lon: 4.3524
    love:
      name: "Grand-Place"
      lat: 50.8468
      lon: 4.3524
    surprise:
      name: "Musée des Sciences"
      lat: 50.8367
      lon: 4.3766

ui:
  eco_delay_ms: 400
  typing_delay_ms: 50

