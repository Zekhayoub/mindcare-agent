    - "boyfriend"
    - "girlfriend"
    - "spouse"
    - "husband"
    - "wife"
    - "relationship"
    - "dating"
    - "breakup"
  academic:
    - "exam"
    - "test"
    - "study"
    - "university"
    - "school"
    - "homework"
    - "assignment"
    - "grade"
    - "student"
  health:
    - "sick"
    - "ill"
    - "pain"
    - "doctor"
    - "hospital"
    - "medical"
    - "health"
    - "symptoms"
    - "treatment"
  financial:
    - "money"
    - "bills"
    - "debt"
    - "salary"
    - "expensive"
    - "cost"
    - "budget"
    - "financial"
  family:
